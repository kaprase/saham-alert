name: Clau Portfolio Bot

on:
  schedule:
    # Aktif jam 07:00 WIB = 00:00 UTC (dengan antisipasi delay GitHub ~3 jam)
    # Cron di set jam 21:00 UTC hari sebelumnya agar jalan sekitar 00:00-01:00 UTC = 07:00-08:00 WIB
    - cron: '0 21 * * 0-6'
  workflow_dispatch:  # Tetap bisa Run manual kapanpun

jobs:
  jalankan-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~6 jam aktif

    steps:
      - name: Ambil kode dari repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install library
        run: pip install -r requirements.txt

      - name: Jalankan Clau Portfolio Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_listener.py
